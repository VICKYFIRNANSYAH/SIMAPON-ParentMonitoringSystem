{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="md:flex md:items-center md:justify-between mb-8">
        <div class="flex-1 min-w-0">
            <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">
                Dashboard Administrator
            </h2>
        </div>
        <div class="mt-4 flex md:mt-0 md:ml-4 gap-2">
            <a href="{% url 'admin:index' %}" target="_blank" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-dark hover:bg-gray-800 transition-colors">
                Buka Django Admin
            </a>
        </div>
    </div>
    
    <div class="bg-white shadow overflow-hidden sm:rounded-lg mb-8">
        <div class="px-4 py-5 sm:px-6 border-b border-gray-200 bg-gray-50">
            <h3 class="text-lg leading-6 font-medium text-gray-900">
                Ringkasan Sistem
            </h3>
        </div>
        <div class="p-6">
            <p class="text-gray-600">Selamat datang di panel Admin. Semua manajemen data master (Guru, Santri, Keuangan, dll) dilakukan melalui Django Admin.</p>
        </div>
    </div>
</div>
{% endblock %}
