{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)]">
    <!-- Sidebar -->
    <aside class="w-64 bg-dark text-white shadow-lg hidden md:block">
        <div class="p-6 border-b border-gray-700">
            <h2 class="text-xl font-bold text-primary">Admin Panel</h2>
        </div>
        <nav class="mt-6">
            <a href="{% url 'admin_dashboard' %}" class="flex items-center px-6 py-3 hover:bg-gray-800 transition-colors {% if request.path == '/dashboard/admin/' %}bg-gray-800 border-l-4 border-primary{% endif %}">
                <svg class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a href="{% url 'admin_guru_list' %}" class="flex items-center px-6 py-3 hover:bg-gray-800 transition-colors {% if 'guru' in request.path %}bg-gray-800 border-l-4 border-primary{% endif %}">
                <svg class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Data Guru
            </a>
            <a href="{% url 'admin_santri_list' %}" class="flex items-center px-6 py-3 hover:bg-gray-800 transition-colors {% if 'santri' in request.path %}bg-gray-800 border-l-4 border-primary{% endif %}">
                <svg class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                Data Santri
            </a>
            <a href="{% url 'admin_finance_list' %}" class="flex items-center px-6 py-3 hover:bg-gray-800 transition-colors {% if 'finance' in request.path %}bg-gray-800 border-l-4 border-primary{% endif %}">
                <svg class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Keuangan (SPP)
            </a>
            <a href="{% url 'admin_permit_list' %}" class="flex items-center px-6 py-3 hover:bg-gray-800 transition-colors {% if 'permit' in request.path %}bg-gray-800 border-l-4 border-primary{% endif %}">
                <svg class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Perizinan
            </a>
            <a href="{% url 'admin_behavior_list' %}" class="flex items-center px-6 py-3 hover:bg-gray-800 transition-colors {% if 'behavior' in request.path %}bg-gray-800 border-l-4 border-primary{% endif %}">
                <svg class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Catatan Sikap
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100">
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block admin_content %}{% endblock %}
        </main>
    </div>
</div>
{% endblock %}
